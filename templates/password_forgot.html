{% extends 'base.html' %}
{% load static %}

{% block title %}ARES | Reset hasła{% endblock %}

{% block guest_content %}
<section class="login-page">
    <div class="login-shell">
        <section class="login-form-zone" aria-label="Reset hasła">
            <div class="login-form-card">
                <div class="login-card-head">
                    <span class="login-card-mark"><img src="{% static 'img/ares-logo.svg' %}" alt=""></span>
                    <div>
                        <h2>Nie pamiętasz hasła?</h2>
                        <p>Podaj login lub e-mail. Wyślemy kod resetu hasła.</p>
                    </div>
                </div>

                <form method="post" class="login-form">
                    {% csrf_token %}
                    <label for="forgot-identity">Login lub e-mail</label>
                    <input id="forgot-identity" type="text" name="identity" placeholder="np. stasi lub email@example.com" autocomplete="username email" required autofocus>
                    <button type="submit" class="login-primary-btn">Wyślij kod resetu</button>
                </form>

                <div class="login-secondary-actions">
                    <a href="{% url 'login' %}">Wróć do logowania</a>
                    <a href="{% url 'password_reset_confirm' %}">Mam już kod</a>
                </div>
            </div>
        </section>
    </div>
</section>
{% endblock %}
