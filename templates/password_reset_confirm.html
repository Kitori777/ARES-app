{% extends 'base.html' %}
{% load static %}

{% block title %}ARES | Ustaw nowe hasło{% endblock %}

{% block guest_content %}
<section class="login-page">
    <div class="login-shell">
        <section class="login-form-zone" aria-label="Nowe hasło">
            <div class="login-form-card">
                <div class="login-card-head">
                    <span class="login-card-mark"><img src="{% static 'img/ares-logo.svg' %}" alt=""></span>
                    <div>
                        <h2>Ustaw nowe hasło</h2>
                        <p>Wpisz kod z e-maila i ustaw nowe hasło do konta.</p>
                    </div>
                </div>

                <form method="post" class="login-form">
                    {% csrf_token %}
                    <label for="reset-email">E-mail konta</label>
                    <input id="reset-email" type="email" name="email" value="{{ reset_email|default:'' }}" placeholder="email@example.com" autocomplete="email" required>

                    <label for="reset-code">Kod resetu</label>
                    <input id="reset-code" type="text" name="code" maxlength="6" placeholder="6 cyfr" autocomplete="one-time-code" required>

                    <label for="reset-pass1">Nowe hasło</label>
                    <input id="reset-pass1" type="password" name="new_password" autocomplete="new-password" required>

                    <label for="reset-pass2">Powtórz nowe hasło</label>
                    <input id="reset-pass2" type="password" name="new_password2" autocomplete="new-password" required>

                    <button type="submit" class="login-primary-btn">Zmień hasło</button>
                </form>

                <div class="login-secondary-actions">
                    <a href="{% url 'password_forgot' %}">Wyślij nowy kod</a>
                    <a href="{% url 'login' %}">Wróć do logowania</a>
                </div>
            </div>
        </section>
    </div>
</section>
{% endblock %}
