<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>ARES — kod weryfikacyjny</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#172033;">
  <div style="padding:28px 14px;background:#f5f7fb;">
    <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:18px;padding:28px;border:1px solid #e4e9f2;box-shadow:0 18px 38px rgba(22,34,51,.10);">
      <div style="font-size:13px;font-weight:800;letter-spacing:.12em;color:#4f73ff;text-transform:uppercase;margin-bottom:10px;">ARES</div>
      <h2 style="margin:0 0 12px;color:#172033;font-size:26px;line-height:1.2;">Potwierdzenie rejestracji</h2>
      <p style="font-size:16px;line-height:1.6;margin:0 0 12px;">Cześć <strong>{{ username }}</strong>,</p>
      <p style="font-size:16px;line-height:1.6;margin:0 0 18px;">Wpisz poniższy kod na stronie weryfikacji, aby dokończyć zakładanie konta:</p>
      <div style="font-size:34px;font-weight:900;letter-spacing:8px;padding:16px 20px;border-radius:14px;background:#eef4ff;display:inline-block;color:#1e4ed8;border:1px solid #d8e5ff;">{{ code }}</div>
      <p style="margin:18px 0 8px;font-size:15px;line-height:1.55;">Kod jest ważny do: <strong>{{ expires_local }}</strong>.</p>
      <p style="color:#61708a;font-size:14px;line-height:1.55;margin:0;">Konto zostanie utworzone dopiero po poprawnym potwierdzeniu adresu e-mail.</p>
    </div>
  </div>
</body>
</html>
