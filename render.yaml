services:
  - type: web
    name: ares
    env: python
    buildCommand: ./build.sh
    startCommand: uv run gunicorn projekt_baza.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ares-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: EMAIL_DELIVERY_MODE
        value: brevo_api
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: ARES
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # SMTP/Gmail fallback - potrzebne tylko, gdy EMAIL_DELIVERY_MODE=gmail albo smtp
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_TIMEOUT
        value: "20"
      - key: EMAIL_VERIFICATION_CODE_ON_SCREEN
        value: "True"
      - key: EMAIL_VERIFICATION_LOG_CODE
        value: "True"

databases:
  - name: ares-db
    databaseName: ares
    user: ares
